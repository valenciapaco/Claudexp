<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistente Financiero</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; font-family: system-ui, -apple-system, sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    select option { background: #1c2333; color: #e6edf3; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── PROVIDER / API KEY ───────────────────────────────────────────────────
    const STORE_KEY      = "af_api_key";
    const STORE_PROVIDER = "af_provider";       // "anthropic" | "openrouter"
    const STORE_OR_MODEL = "af_or_model";       // OpenRouter model string

    const getApiKey    = ()  => localStorage.getItem(STORE_KEY)      || "";
    const getProvider  = ()  => localStorage.getItem(STORE_PROVIDER) || "anthropic";
    const getORModel   = ()  => localStorage.getItem(STORE_OR_MODEL) || "openrouter/auto";

    const saveApiKey   = (v) => localStorage.setItem(STORE_KEY,      v);
    const saveProvider = (v) => localStorage.setItem(STORE_PROVIDER, v);
    const saveORModel  = (v) => localStorage.setItem(STORE_OR_MODEL, v);

    // ─── UNIFIED AI CALL ──────────────────────────────────────────────────────
    async function callAI(system, prompt, maxTokens) {
      const provider = getProvider();

      if (provider === "openrouter") {
        const msgs = [];
        if (system) msgs.push({ role: "system", content: system });
        msgs.push({ role: "user", content: prompt });
        const r = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${getApiKey()}`,
          },
          body: JSON.stringify({ model: getORModel(), max_tokens: maxTokens, messages: msgs })
        });
        const d = await r.json();
        if (d.error) throw new Error(d.error.message || "Error de OpenRouter");
        return d.choices?.[0]?.message?.content || "";
      } else {
        // Anthropic
        const body = {
          model: "claude-sonnet-4-20250514",
          max_tokens: maxTokens,
          messages: [{ role: "user", content: prompt }]
        };
        if (system) body.system = system;
        const r = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": getApiKey(),
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify(body)
        });
        const d = await r.json();
        if (d.error) throw new Error(d.error.message || "Error de Anthropic");
        return d.content?.[0]?.text || "";
      }
    }

    // ─── CSV / LOCAL STORAGE ──────────────────────────────────────────────────
    const STORAGE_KEY = "asistente_financiero_data";
    const generateId  = () => `${Date.now()}-${Math.random().toString(36).slice(2,9)}`;

    function getAllEntries() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
      catch { return []; }
    }
    function saveAllEntries(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }
    function csvQuery(month, year) {
      return getAllEntries().filter(e => e.mes === month && e.anio === year);
    }
    function csvCreate(entry, month, year) {
      const all = getAllEntries();
      const newEntry = { ...entry, id: generateId(), mes: month, anio: year };
      all.push(newEntry);
      saveAllEntries(all);
      return newEntry.id;
    }
    function csvDeleteEntry(id) {
      saveAllEntries(getAllEntries().filter(e => e.id !== id));
    }
    function exportToCSV() {
      const all = getAllEntries();
      if (!all.length) return;
      const headers = ["id","tipo","monto","concepto","categoria","fecha","cliente_proveedor","mes","anio"];
      const rows = all.map(e =>
        headers.map(h => `"${String(e[h] ?? "").replace(/"/g,'""')}"`).join(",")
      );
      const csv = [headers.join(","), ...rows].join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href = url; a.download = "finanzas.csv"; a.click();
      URL.revokeObjectURL(url);
    }
    function importFromCSVText(text) {
      const lines = text.trim().split("\n");
      if (lines.length < 2) return 0;
      const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g,""));
      const imported = [];
      for (let i = 1; i < lines.length; i++) {
        const values = [];
        let cur = "", inQ = false;
        for (const ch of lines[i]) {
          if (ch === '"') { inQ = !inQ; }
          else if (ch === ',' && !inQ) { values.push(cur); cur = ""; }
          else { cur += ch; }
        }
        values.push(cur);
        const entry = {};
        headers.forEach((h, idx) => { entry[h] = values[idx]?.replace(/^"|"$/g,"") ?? ""; });
        if (entry.id && entry.tipo) {
          entry.monto = parseFloat(entry.monto) || 0;
          entry.mes   = parseInt(entry.mes)   || 0;
          entry.anio  = parseInt(entry.anio)  || new Date().getFullYear();
          imported.push(entry);
        }
      }
      if (!imported.length) return 0;
      const existing    = getAllEntries();
      const existingIds = new Set(existing.map(e => e.id));
      const newOnes     = imported.filter(e => !existingIds.has(e.id));
      saveAllEntries([...existing, ...newOnes]);
      return newOnes.length;
    }

    // ─── CONSTANTS ────────────────────────────────────────────────────────────
    const MONTHS       = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const CATS_INGRESO = ["Ventas","Servicios","Honorarios","Intereses","Otros ingresos"];
    const CATS_GASTO   = ["Nomina","Renta","Marketing","Operaciones","Tecnologia","Impuestos","Financieros","Otros gastos"];
    const fmtMXN = (n) => new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",minimumFractionDigits:0}).format(n||0);

    // ─── AI FUNCTIONS ─────────────────────────────────────────────────────────
    async function aiParse(text, month, year) {
      const system = `Eres contador mexicano. Extrae movimientos financieros y devuelve SOLO un JSON array.
Cada objeto: {"tipo":"ingreso"|"gasto","monto":numero,"concepto":"string","categoria":"string","fecha":"YYYY-MM-DD","cliente_proveedor":"string o null"}
Categorias ingreso: ${CATS_INGRESO.join(", ")}
Categorias gasto: ${CATS_GASTO.join(", ")}
Si no hay fecha usa ${year}-${String(month+1).padStart(2,"0")}-01
Responde UNICAMENTE el JSON array sin markdown ni explicacion.`;
      const raw = (await callAI(system, text, 1000)).replace(/```json|```/g,"").trim();
      return JSON.parse(raw);
    }

    async function aiAnalysis(entries, month, year) {
      const ti = entries.filter(e=>e.tipo==="ingreso").reduce((s,e)=>s+e.monto,0);
      const tg = entries.filter(e=>e.tipo==="gasto").reduce((s,e)=>s+e.monto,0);
      const prompt = `Resumen ejecutivo financiero de ${MONTHS[month]} ${year} (max 150 palabras, espanol, lenguaje de negocios): Ingresos: ${fmtMXN(ti)} | Gastos: ${fmtMXN(tg)} | Utilidad: ${fmtMXN(ti-tg)} | Margen: ${ti>0?((ti-tg)/ti*100).toFixed(1):0}%. Movimientos: ${JSON.stringify(entries.map(e=>({t:e.tipo,m:e.monto,c:e.concepto})))}`;
      return callAI("", prompt, 600);
    }

    // ─── STYLES ───────────────────────────────────────────────────────────────
    const S = {
      bg:"#0d1117", surface:"#161b22", alt:"#1c2333", border:"#30363d",
      accent:"#e6b84a", accentL:"rgba(230,184,74,0.15)", accentB:"rgba(230,184,74,0.3)",
      green:"#3fb950", greenL:"rgba(63,185,80,0.12)", greenB:"rgba(63,185,80,0.3)",
      red:"#f85149", redL:"rgba(248,81,73,0.12)", redB:"rgba(248,81,73,0.3)",
      blue:"#58a6ff", blueL:"rgba(88,166,255,0.12)",
      purple:"#a371f7", purpleL:"rgba(163,113,247,0.12)", purpleB:"rgba(163,113,247,0.3)",
      tx:"#e6edf3", tx2:"#8b949e", tx3:"#484f58",
    };

    // ─── SETUP SCREEN ─────────────────────────────────────────────────────────
    const PROVIDERS = {
      anthropic:  { label: "Anthropic",   placeholder: "sk-ant-api03-...", hint: "console.anthropic.com → API Keys",   validate: k => k.startsWith("sk-ant-") },
      openrouter: { label: "OpenRouter",  placeholder: "sk-or-v1-...",     hint: "openrouter.ai/keys",                validate: k => k.length > 20 },
    };

    function ApiKeySetup({ onSave }) {
      const [provider, setProvider] = useState("anthropic");
      const [key,      setKey]      = useState("");
      const [model,    setModel]    = useState("openrouter/auto");
      const [show,     setShow]     = useState(false);

      const prov  = PROVIDERS[provider];
      const valid = key.trim() && prov.validate(key.trim());

      const handleSave = () => {
        if (!valid) return;
        saveProvider(provider);
        saveApiKey(key.trim());
        if (provider === "openrouter") saveORModel(model.trim() || "openrouter/auto");
        onSave();
      };

      return (
        <div style={{minHeight:"100vh",background:S.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:S.surface,border:`1px solid ${S.border}`,borderRadius:14,padding:36,width:"100%",maxWidth:460}}>

            {/* Logo */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:28}}>
              <div style={{width:34,height:34,borderRadius:9,background:S.accentL,border:`1px solid ${S.accentB}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color:S.accent}}>$</div>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:S.tx}}>Asistente Financiero</div>
                <div style={{color:S.tx3,fontSize:11}}>Base de datos local (CSV)</div>
              </div>
            </div>

            {/* Provider selector */}
            <div style={{marginBottom:20}}>
              <div style={{color:S.tx3,fontSize:11,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:8}}>Proveedor de IA</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {Object.entries(PROVIDERS).map(([id, p]) => {
                  const active = provider === id;
                  const isOR   = id === "openrouter";
                  const col    = isOR ? S.purple : S.accent;
                  const colL   = isOR ? S.purpleL : S.accentL;
                  const colB   = isOR ? S.purpleB : S.accentB;
                  return (
                    <button key={id} onClick={()=>{ setProvider(id); setKey(""); }}
                      style={{background:active?colL:S.alt,border:`1px solid ${active?colB:S.border}`,borderRadius:9,padding:"12px 14px",cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
                      <div style={{color:active?col:S.tx2,fontWeight:700,fontSize:13}}>{p.label}</div>
                      <div style={{color:S.tx3,fontSize:11,marginTop:2}}>{isOR?"Múltiples modelos":"Claude directo"}</div>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* API Key input */}
            <div style={{marginBottom:provider==="openrouter"?10:16}}>
              <div style={{color:S.tx3,fontSize:11,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:8}}>API Key</div>
              <div style={{position:"relative"}}>
                <input
                  type={show ? "text" : "password"}
                  value={key}
                  onChange={e => setKey(e.target.value)}
                  onKeyDown={e => { if (e.key==="Enter" && valid) handleSave(); }}
                  placeholder={prov.placeholder}
                  style={{width:"100%",background:S.alt,border:`1px solid ${valid?S.accentB:S.border}`,borderRadius:8,padding:"10px 52px 10px 12px",color:S.tx,fontSize:13,outline:"none",fontFamily:"monospace"}}
                />
                <button onClick={()=>setShow(s=>!s)}
                  style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:S.tx3,cursor:"pointer",fontSize:11}}>
                  {show?"Ocultar":"Ver"}
                </button>
              </div>
            </div>

            {/* OpenRouter model */}
            {provider === "openrouter" && (
              <div style={{marginBottom:16}}>
                <div style={{color:S.tx3,fontSize:11,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:8}}>Modelo</div>
                <input
                  type="text"
                  value={model}
                  onChange={e => setModel(e.target.value)}
                  placeholder="openrouter/auto"
                  style={{width:"100%",background:S.alt,border:`1px solid ${S.border}`,borderRadius:8,padding:"10px 12px",color:S.tx,fontSize:13,outline:"none",fontFamily:"monospace"}}
                />
                <div style={{color:S.tx3,fontSize:11,marginTop:6}}>Ej: openai/gpt-4o · google/gemini-pro · anthropic/claude-opus-4</div>
              </div>
            )}

            <button onClick={handleSave} disabled={!valid}
              style={{background:valid?S.accent:"#1c2333",color:valid?"#000":S.tx3,border:"none",borderRadius:8,padding:"10px 0",fontWeight:700,fontSize:13,cursor:valid?"pointer":"not-allowed",width:"100%",marginBottom:14,transition:"all 0.15s"}}>
              Guardar y continuar
            </button>

            <div style={{color:S.tx3,fontSize:11,lineHeight:1.8}}>
              Tu API Key se guarda solo en tu navegador (localStorage).<br/>
              Obtenla en <span style={{color:S.blue}}>{prov.hint}</span>
            </div>
          </div>
        </div>
      );
    }

    // ─── COMPONENTS ───────────────────────────────────────────────────────────
    const Badge = ({c,children}) => {
      const m = {green:{bg:S.greenL,cl:S.green,b:S.greenB},red:{bg:S.redL,cl:S.red,b:S.redB},gold:{bg:S.accentL,cl:S.accent,b:S.accentB},blue:{bg:S.blueL,cl:S.blue,b:"rgba(88,166,255,0.3)"},purple:{bg:S.purpleL,cl:S.purple,b:S.purpleB}};
      const s = m[c] || m.blue;
      return <span style={{background:s.bg,color:s.cl,border:`1px solid ${s.b}`,padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:700,letterSpacing:"0.05em"}}>{children}</span>;
    };

    const TabBtn = ({active,onClick,children}) => (
      <button onClick={onClick} style={{background:active?S.accentL:"none",border:active?`1px solid ${S.accentB}`:"1px solid transparent",color:active?S.accent:S.tx3,borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.15s"}}>
        {children}
      </button>
    );

    const SectionBar = ({children}) => (
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <div style={{width:3,height:14,background:S.accent,borderRadius:2}}/>
        <span style={{color:S.tx3,fontSize:10,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700}}>{children}</span>
      </div>
    );

    function EntryRow({e, onDel, deleting}) {
      const ing = e.tipo === "ingreso";
      return (
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 11px",background:S.alt,borderRadius:7,marginBottom:5,border:`1px solid ${S.border}`,opacity:deleting?0.4:1,transition:"opacity 0.2s"}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:ing?S.green:S.red,flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:S.tx,fontSize:12,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.concepto}</div>
            <div style={{color:S.tx3,fontSize:11,marginTop:1}}>{e.categoria}{e.cliente_proveedor?` - ${e.cliente_proveedor}`:""}</div>
          </div>
          <div style={{color:ing?S.green:S.red,fontFamily:"monospace",fontSize:13,fontWeight:700,flexShrink:0}}>{ing?"+":"-"}{fmtMXN(e.monto)}</div>
          <button onClick={()=>onDel(e)} disabled={deleting} style={{background:"none",border:"none",cursor:"pointer",color:S.tx3,fontSize:16,padding:"0 2px",lineHeight:1}}>×</button>
        </div>
      );
    }

    // ─── FORMATTED TEXT ───────────────────────────────────────────────────────
    function FormattedText({ text }) {
      // Split into lines and render with styling
      const lines = text.split("\n").filter((l, i, arr) => !(l.trim() === "" && arr[i-1]?.trim() === ""));

      const renderInline = (line) => {
        // Bold: **text**
        const parts = line.split(/(\*\*[^*]+\*\*)/g);
        return parts.map((part, i) => {
          if (part.startsWith("**") && part.endsWith("**")) {
            return <strong key={i} style={{color:S.tx,fontWeight:700}}>{part.slice(2,-2)}</strong>;
          }
          // Highlight currency amounts
          const chunks = part.split(/((?:\$|MXN\s*)[\d,]+(?:\.\d+)?(?:\s*(?:mil|millones)?)?)/g);
          return chunks.map((chunk, j) =>
            /^\$|^MXN/.test(chunk)
              ? <span key={`${i}-${j}`} style={{color:S.accent,fontFamily:"monospace",fontWeight:600}}>{chunk}</span>
              : chunk
          );
        });
      };

      return (
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {lines.map((line, i) => {
            const trimmed = line.trim();
            if (!trimmed) return <div key={i} style={{height:4}}/>;

            // Bullet point
            if (/^[-•*]\s/.test(trimmed)) {
              return (
                <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                  <div style={{width:4,height:4,borderRadius:"50%",background:S.accent,marginTop:7,flexShrink:0}}/>
                  <span style={{color:S.tx2,fontSize:13,lineHeight:1.7}}>{renderInline(trimmed.replace(/^[-•*]\s/,""))}</span>
                </div>
              );
            }

            // Numbered list
            if (/^\d+\.\s/.test(trimmed)) {
              const num = trimmed.match(/^(\d+)\./)[1];
              return (
                <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                  <span style={{color:S.accent,fontSize:11,fontWeight:700,fontFamily:"monospace",marginTop:2,flexShrink:0,minWidth:16}}>{num}.</span>
                  <span style={{color:S.tx2,fontSize:13,lineHeight:1.7}}>{renderInline(trimmed.replace(/^\d+\.\s/,""))}</span>
                </div>
              );
            }

            // Section header (all caps or ends with :)
            if (trimmed === trimmed.toUpperCase() && trimmed.length > 3 && /[A-Z]/.test(trimmed)) {
              return (
                <div key={i} style={{color:S.tx3,fontSize:10,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:700,marginTop:6,paddingBottom:4,borderBottom:`1px solid ${S.border}`}}>
                  {trimmed}
                </div>
              );
            }

            // Regular paragraph
            return (
              <p key={i} style={{color:S.tx2,fontSize:13,lineHeight:1.75,margin:0}}>
                {renderInline(trimmed)}
              </p>
            );
          })}
        </div>
      );
    }

    // ─── TABS ─────────────────────────────────────────────────────────────────
    function Resumen({entries,month,year}) {
      const [analysis,setAnalysis] = useState("");
      const [loading,setLoading]   = useState(false);
      const ti   = entries.filter(e=>e.tipo==="ingreso").reduce((s,e)=>s+e.monto,0);
      const tg   = entries.filter(e=>e.tipo==="gasto").reduce((s,e)=>s+e.monto,0);
      const util = ti - tg;
      const gen  = async () => {
        if (!entries.length) return;
        setLoading(true);
        try { setAnalysis(await aiAnalysis(entries,month,year)); }
        finally { setLoading(false); }
      };
      return (
        <div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
            {[[fmtMXN(ti),"Ingresos",S.green],[fmtMXN(tg),"Gastos",S.red],[fmtMXN(util),"Utilidad",util>=0?S.green:S.red]].map(([v,l,c])=>(
              <div key={l} style={{background:S.surface,border:`1px solid ${S.border}`,borderRadius:9,padding:"14px 16px"}}>
                <div style={{color:S.tx3,fontSize:10,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:5}}>{l}</div>
                <div style={{color:c,fontSize:19,fontWeight:700,fontFamily:"monospace"}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:18}}>
            {[[`${ti>0?((util/ti)*100).toFixed(1):0}%`,"Margen"],[`${entries.length} mov.`,"Registros"],[util>=0?"Superavit":"Deficit","Balance"]].map(([v,l])=>(
              <div key={l} style={{background:S.alt,border:`1px solid ${S.border}`,borderRadius:7,padding:"10px 12px"}}>
                <div style={{color:S.tx3,fontSize:10,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:3}}>{l}</div>
                <div style={{color:S.tx,fontSize:14,fontWeight:700}}>{v}</div>
              </div>
            ))}
          </div>
          <div style={{background:S.alt,border:`1px solid ${S.border}`,borderRadius:10,padding:18,minHeight:110}}>
            {analysis
              ? <><FormattedText text={analysis}/>
                  <button onClick={gen} disabled={loading} style={{background:"none",border:`1px solid ${S.border}`,color:S.tx3,borderRadius:6,padding:"5px 12px",fontSize:11,cursor:"pointer",marginTop:14}}>{loading?"...":"Regenerar"}</button></>
              : <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:100,gap:10}}>
                  <span style={{color:S.tx3,fontSize:13}}>Analisis ejecutivo con IA</span>
                  <button onClick={gen} disabled={loading||!entries.length} style={{background:entries.length?S.accent:"none",color:entries.length?"#000":S.tx3,border:`1px solid ${entries.length?S.accent:S.border}`,borderRadius:8,padding:"8px 20px",fontWeight:700,fontSize:13,cursor:entries.length?"pointer":"not-allowed"}}>
                    {loading?"Analizando...":"Generar Resumen"}
                  </button>
                </div>
            }
          </div>
        </div>
      );
    }

    function Resultados({entries}) {
      const ingresos = entries.filter(e=>e.tipo==="ingreso");
      const gastos   = entries.filter(e=>e.tipo==="gasto");
      const ti   = ingresos.reduce((s,e)=>s+e.monto,0);
      const tg   = gastos.reduce((s,e)=>s+e.monto,0);
      const util = ti - tg;
      const bycat = (arr) => arr.reduce((a,e)=>{(a[e.categoria]=a[e.categoria]||[]).push(e);return a;},{});
      const Sec = ({title,items,color,total}) => {
        const g = bycat(items);
        return (
          <div style={{marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",padding:"7px 11px",background:color==="green"?S.greenL:S.redL,border:`1px solid ${color==="green"?S.greenB:S.redB}`,borderRadius:7,marginBottom:5}}>
              <span style={{color:color==="green"?S.green:S.red,fontWeight:700,fontSize:11,textTransform:"uppercase",letterSpacing:"0.06em"}}>{title}</span>
              <span style={{color:color==="green"?S.green:S.red,fontFamily:"monospace",fontWeight:700,fontSize:13}}>{fmtMXN(total)}</span>
            </div>
            {Object.entries(g).map(([cat,its])=>{
              const sub = its.reduce((s,i)=>s+i.monto,0);
              return (
                <div key={cat}>
                  <div style={{display:"flex",justifyContent:"space-between",padding:"5px 11px"}}>
                    <span style={{color:S.tx2,fontSize:12,fontWeight:600}}>{cat}</span>
                    <span style={{color:S.tx2,fontFamily:"monospace",fontSize:12}}>{fmtMXN(sub)}</span>
                  </div>
                  {its.map(i=>(
                    <div key={i.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 22px"}}>
                      <span style={{color:S.tx3,fontSize:12}}>{i.concepto}</span>
                      <span style={{color:S.tx3,fontFamily:"monospace",fontSize:12}}>{fmtMXN(i.monto)}</span>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        );
      };
      return (
        <div>
          <Sec title="Ingresos" items={ingresos} color="green" total={ti}/>
          <Sec title="Gastos"   items={gastos}   color="red"   total={tg}/>
          <div style={{borderTop:`1px solid ${S.border}`,paddingTop:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{color:util>=0?S.green:S.red,fontWeight:800,fontSize:18,fontFamily:"monospace"}}>{fmtMXN(util)}</div>
              <div style={{color:S.tx3,fontSize:12,marginTop:2}}>Utilidad Neta · {ti>0?((util/ti)*100).toFixed(1):0}% margen</div>
            </div>
            <Badge c={util>=0?"green":"red"}>{util>=0?"SUPERAVIT":"DEFICIT"}</Badge>
          </div>
        </div>
      );
    }

    function Flujo({entries}) {
      const sorted = [...entries].sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
      let saldo = 0;
      const rows = sorted.map(e=>{saldo+=e.tipo==="ingreso"?e.monto:-e.monto;return{...e,saldo};});
      return (
        <div>
          <div style={{display:"grid",gridTemplateColumns:"70px 1fr 100px 100px 100px",padding:"5px 10px",borderBottom:`1px solid ${S.border}`,marginBottom:3}}>
            {["Fecha","Concepto","Entrada","Salida","Saldo"].map((h,i)=>(
              <div key={h} style={{color:S.tx3,fontSize:10,textTransform:"uppercase",letterSpacing:"0.08em",textAlign:i>1?"right":"left"}}>{h}</div>
            ))}
          </div>
          {!rows.length && <div style={{color:S.tx3,textAlign:"center",padding:36,fontSize:13}}>Sin movimientos este mes</div>}
          {rows.map(r=>(
            <div key={r.id} style={{display:"grid",gridTemplateColumns:"70px 1fr 100px 100px 100px",padding:"7px 10px",borderBottom:`1px solid ${S.border}`,alignItems:"center"}}>
              <div style={{color:S.tx3,fontSize:11,fontFamily:"monospace"}}>{(r.fecha||"").slice(5)}</div>
              <div style={{color:S.tx,fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingRight:8}}>{r.concepto}</div>
              <div style={{textAlign:"right",color:S.green,fontFamily:"monospace",fontSize:12}}>{r.tipo==="ingreso"?fmtMXN(r.monto):""}</div>
              <div style={{textAlign:"right",color:S.red,fontFamily:"monospace",fontSize:12}}>{r.tipo==="gasto"?fmtMXN(r.monto):""}</div>
              <div style={{textAlign:"right",color:r.saldo>=0?S.tx:S.red,fontFamily:"monospace",fontSize:12,fontWeight:700}}>{fmtMXN(r.saldo)}</div>
            </div>
          ))}
        </div>
      );
    }

    function Balance({entries}) {
      const ti   = entries.filter(e=>e.tipo==="ingreso").reduce((s,e)=>s+e.monto,0);
      const tg   = entries.filter(e=>e.tipo==="gasto").reduce((s,e)=>s+e.monto,0);
      const util = ti - tg;
      const R = ({l,v,bold,color,indent}) => (
        <div style={{display:"flex",justifyContent:"space-between",padding:`${bold?8:5}px ${indent?20:10}px`,borderBottom:bold?`1px solid ${S.border}`:"none"}}>
          <span style={{color:bold?S.tx:S.tx2,fontSize:bold?13:12,fontWeight:bold?700:400}}>{l}</span>
          <span style={{color:color||(bold?S.tx:S.tx2),fontFamily:"monospace",fontSize:bold?13:12,fontWeight:bold?700:400}}>{fmtMXN(v)}</span>
        </div>
      );
      return (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <div>
            <div style={{background:S.blueL,border:"1px solid rgba(88,166,255,0.3)",borderRadius:7,padding:"6px 10px",color:S.blue,fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>ACTIVO</div>
            <R l="Efectivo y equiv." v={Math.max(0,util)} bold/>
            <R l="Cuentas por cobrar" v={0} indent/>
            <R l="Total Activo Circ." v={Math.max(0,util)} bold color={S.blue}/>
            <div style={{marginTop:10}}><R l="Activo Fijo" v={0} indent/><R l="Total Activo No Circ." v={0} bold color={S.blue}/></div>
            <div style={{marginTop:8,borderTop:`2px solid ${S.blue}`,paddingTop:6}}><R l="TOTAL ACTIVO" v={Math.max(0,util)} bold color={S.blue}/></div>
          </div>
          <div>
            <div style={{background:S.accentL,border:`1px solid ${S.accentB}`,borderRadius:7,padding:"6px 10px",color:S.accent,fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>PASIVO + CAPITAL</div>
            <R l="Cuentas por pagar" v={0} indent/>
            <R l="Total Pasivo Circ." v={0} bold color={S.accent}/>
            <div style={{marginTop:10}}><R l="Pasivo LP" v={0} indent/><R l="Total Pasivo" v={0} bold color={S.accent}/></div>
            <div style={{marginTop:10}}><R l="Capital Contable" v={0} indent/><R l="Utilidad del ejercicio" v={util} indent color={util>=0?S.green:S.red}/><R l="Total Capital" v={util} bold color={util>=0?S.green:S.red}/></div>
            <div style={{marginTop:8,borderTop:`2px solid ${S.accent}`,paddingTop:6}}><R l="TOTAL PASIVO + CAPITAL" v={Math.max(0,util)} bold color={S.accent}/></div>
          </div>
        </div>
      );
    }

    // ─── MAIN APP ─────────────────────────────────────────────────────────────
    function MainApp() {
      const now = new Date();
      const [month,      setMonth]      = useState(now.getMonth());
      const [year,       setYear]       = useState(now.getFullYear());
      const [entries,    setEntries]    = useState([]);
      const [input,      setInput]      = useState("");
      const [phase,      setPhase]      = useState("idle");
      const [note,       setNote]       = useState({msg:"",ok:true});
      const [tab,        setTab]        = useState("resumen");
      const [deletingId, setDeletingId] = useState(null);
      const [showKeyBox, setShowKeyBox] = useState(false);
      const [kDraft,     setKDraft]     = useState(getApiKey());
      const [pDraft,     setPDraft]     = useState(getProvider());
      const [mDraft,     setMDraft]     = useState(getORModel());
      const noteTimer = useRef(null);
      const importRef = useRef(null);

      const flash = useCallback((msg, ok=true, ms=4000) => {
        setNote({msg,ok});
        clearTimeout(noteTimer.current);
        if (ms) noteTimer.current = setTimeout(()=>setNote({msg:"",ok:true}), ms);
      }, []);

      const load = useCallback(() => {
        setPhase("loading");
        try {
          const data = csvQuery(month, year);
          setEntries(data);
          flash(`Listo: ${data.length} movimiento(s) en ${MONTHS[month]} ${year}`, true);
        } catch(err) {
          flash(`Error al cargar: ${err.message}`, false);
          setEntries([]);
        } finally {
          setPhase("idle");
        }
      }, [month, year, flash]);

      useEffect(() => { load(); }, [load]);

      const handleAdd = async () => {
        if (!input.trim() || phase !== "idle") return;
        setPhase("parsing");
        flash("Parseando con IA...", true, 0);
        try {
          const parsed = await aiParse(input, month, year);
          if (!parsed.length) {
            flash("No identifique movimientos. Se mas especifico.", false);
            setPhase("idle");
            return;
          }
          setPhase("saving");
          flash(`Guardando ${parsed.length} movimiento(s)...`, true, 0);
          const saved = [];
          for (const e of parsed) {
            const id = csvCreate(e, month, year);
            saved.push({ ...e, id });
          }
          setEntries(prev => [...prev, ...saved]);
          setInput("");
          flash(`${saved.length} movimiento(s) guardado(s)`, true);
        } catch(err) {
          flash(`Error: ${err.message}`, false);
        } finally {
          setPhase("idle");
        }
      };

      const handleDelete = (e) => {
        if (phase !== "idle") return;
        setDeletingId(e.id);
        setPhase("deleting");
        try {
          csvDeleteEntry(e.id);
          setEntries(prev => prev.filter(x => x.id !== e.id));
          flash("Eliminado", true);
        } catch(err) {
          flash(`Error: ${err.message}`, false);
        } finally {
          setDeletingId(null);
          setPhase("idle");
        }
      };

      const handleImport = (evt) => {
        const file = evt.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const count = importFromCSVText(e.target.result);
          flash(count > 0 ? `${count} registro(s) importado(s)` : "Sin registros nuevos en el archivo", count > 0);
          load();
        };
        reader.readAsText(file);
        evt.target.value = "";
      };

      const saveSettings = () => {
        saveProvider(pDraft);
        saveApiKey(kDraft.trim());
        if (pDraft === "openrouter") saveORModel(mDraft.trim() || "openrouter/auto");
        setShowKeyBox(false);
        flash("Configuracion guardada", true);
      };

      const currentProvider = getProvider();
      const providerLabel   = currentProvider === "openrouter" ? "OpenRouter" : "Anthropic";
      const providerColor   = currentProvider === "openrouter" ? S.purple : S.accent;
      const providerBadge   = currentProvider === "openrouter" ? "purple" : "gold";

      const busy = phase !== "idle";
      const TABS = [
        {id:"resumen",     l:"Resumen"},
        {id:"resultados",  l:"Estado de Resultados"},
        {id:"flujo",       l:"Flujo de Caja"},
        {id:"balance",     l:"Balance"},
      ];

      return (
        <div style={{minHeight:"100vh",background:S.bg,color:S.tx,fontFamily:"system-ui,-apple-system,sans-serif",fontSize:14}}>

          {/* HEADER */}
          <div style={{background:S.surface,borderBottom:`1px solid ${S.border}`,padding:"12px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:28,height:28,borderRadius:7,background:S.accentL,border:`1px solid ${S.accentB}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:S.accent}}>$</div>
              <div>
                <div style={{fontWeight:700,fontSize:14}}>Asistente Financiero</div>
                <div style={{color:S.tx3,fontSize:11}}>Base de datos local (CSV)</div>
              </div>
            </div>
            <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
              <select value={month} onChange={e=>setMonth(+e.target.value)}
                style={{background:S.alt,border:`1px solid ${S.border}`,color:S.tx,borderRadius:6,padding:"5px 9px",fontSize:12,cursor:"pointer"}}>
                {MONTHS.map((m,i)=><option key={i} value={i}>{m}</option>)}
              </select>
              <select value={year} onChange={e=>setYear(+e.target.value)}
                style={{background:S.alt,border:`1px solid ${S.border}`,color:S.tx,borderRadius:6,padding:"5px 9px",fontSize:12,cursor:"pointer"}}>
                {[2024,2025,2026,2027].map(y=><option key={y} value={y}>{y}</option>)}
              </select>
              <button onClick={load} disabled={busy}
                style={{background:S.alt,border:`1px solid ${S.border}`,color:busy?S.tx3:S.tx2,borderRadius:6,padding:"5px 14px",fontSize:12,cursor:busy?"not-allowed":"pointer",fontWeight:600}}>
                {phase==="loading"?"Cargando...":"Recargar"}
              </button>
              <button onClick={exportToCSV}
                style={{background:S.alt,border:`1px solid ${S.border}`,color:S.tx2,borderRadius:6,padding:"5px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>
                Exportar CSV
              </button>
              <input ref={importRef} type="file" accept=".csv" onChange={handleImport} style={{display:"none"}}/>
              <button onClick={()=>importRef.current?.click()}
                style={{background:S.alt,border:`1px solid ${S.border}`,color:S.tx2,borderRadius:6,padding:"5px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>
                Importar CSV
              </button>
              <button onClick={()=>{ setKDraft(getApiKey()); setPDraft(getProvider()); setMDraft(getORModel()); setShowKeyBox(s=>!s); }}
                style={{background:S.alt,border:`1px solid ${providerColor}`,color:providerColor,borderRadius:6,padding:"5px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>
                ⚙ {providerLabel}
              </button>
              <Badge c="gold">{entries.length} mov.</Badge>
            </div>
          </div>

          {/* SETTINGS PANEL */}
          {showKeyBox && (
            <div style={{background:"#0d1520",borderBottom:`1px solid ${S.border}`,padding:"14px 24px",display:"flex",alignItems:"flex-start",gap:16,flexWrap:"wrap"}}>

              {/* Provider toggle */}
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <span style={{color:S.tx3,fontSize:11,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700}}>Proveedor</span>
                <div style={{display:"flex",gap:6}}>
                  {["anthropic","openrouter"].map(id => {
                    const active = pDraft === id;
                    const col    = id==="openrouter" ? S.purple : S.accent;
                    const colB   = id==="openrouter" ? S.purpleB : S.accentB;
                    return (
                      <button key={id} onClick={()=>setPDraft(id)}
                        style={{background:active?"transparent":S.alt,border:`1px solid ${active?col:S.border}`,color:active?col:S.tx3,borderRadius:6,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                        {id==="anthropic"?"Anthropic":"OpenRouter"}
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Key input */}
              <div style={{display:"flex",flexDirection:"column",gap:6,flex:1,minWidth:200}}>
                <span style={{color:S.tx3,fontSize:11,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700}}>API Key</span>
                <input type="password" value={kDraft} onChange={e=>setKDraft(e.target.value)}
                  placeholder={PROVIDERS[pDraft].placeholder}
                  style={{background:S.alt,border:`1px solid ${S.border}`,borderRadius:6,padding:"5px 10px",color:S.tx,fontSize:12,outline:"none",fontFamily:"monospace"}}
                />
              </div>

              {/* OpenRouter model */}
              {pDraft === "openrouter" && (
                <div style={{display:"flex",flexDirection:"column",gap:6,flex:1,minWidth:180}}>
                  <span style={{color:S.tx3,fontSize:11,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700}}>Modelo</span>
                  <input type="text" value={mDraft} onChange={e=>setMDraft(e.target.value)}
                    placeholder="openrouter/auto"
                    style={{background:S.alt,border:`1px solid ${S.border}`,borderRadius:6,padding:"5px 10px",color:S.tx,fontSize:12,outline:"none",fontFamily:"monospace"}}
                  />
                </div>
              )}

              {/* Actions */}
              <div style={{display:"flex",gap:8,alignItems:"flex-end",paddingTop:22}}>
                <button onClick={saveSettings}
                  style={{background:S.accent,color:"#000",border:"none",borderRadius:6,padding:"6px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                  Guardar
                </button>
                <button onClick={()=>setShowKeyBox(false)}
                  style={{background:"none",border:`1px solid ${S.border}`,color:S.tx3,borderRadius:6,padding:"6px 12px",fontSize:12,cursor:"pointer"}}>
                  Cancelar
                </button>
              </div>
            </div>
          )}

          <div style={{display:"grid",gridTemplateColumns:"290px 1fr",minHeight:"calc(100vh - 53px)"}}>
            {/* LEFT PANEL */}
            <div style={{borderRight:`1px solid ${S.border}`,padding:16,display:"flex",flexDirection:"column",gap:12}}>
              <SectionBar>Registrar movimiento</SectionBar>
              <textarea
                value={input}
                onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"&&(e.metaKey||e.ctrlKey))handleAdd();}}
                placeholder={'Ej: "Cobre $45,000 de honorarios a KEEWE" o "Pague renta $8,500 y servicios $3,200"'}
                rows={4}
                style={{width:"100%",background:S.alt,border:`1px solid ${S.border}`,borderRadius:8,padding:"10px 11px",color:S.tx,fontSize:13,resize:"vertical",fontFamily:"inherit",lineHeight:1.6,boxSizing:"border-box",outline:"none"}}
              />
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                <span style={{color:note.ok?S.tx3:S.red,fontSize:12,flex:1}}>{note.msg}</span>
                <button onClick={handleAdd} disabled={busy||!input.trim()}
                  style={{background:busy||!input.trim()?S.alt:S.accent,color:busy||!input.trim()?S.tx3:"#000",border:"none",borderRadius:7,padding:"8px 15px",fontWeight:700,fontSize:13,cursor:busy||!input.trim()?"not-allowed":"pointer",flexShrink:0,transition:"all 0.15s"}}>
                  {phase==="parsing"?"Parseando...":phase==="saving"?"Guardando...":"Registrar"}
                </button>
              </div>
              <div style={{color:S.tx3,fontSize:11,marginTop:-6}}>Cmd/Ctrl + Enter para enviar</div>

              <div style={{flex:1,overflowY:"auto",marginTop:4}}>
                <SectionBar>{MONTHS[month]} {year}</SectionBar>
                {phase==="loading"
                  ? <div style={{color:S.tx3,textAlign:"center",padding:28,fontSize:13}}>Cargando...</div>
                  : entries.length===0
                    ? <div style={{color:S.tx3,textAlign:"center",padding:28,fontSize:13}}>Sin movimientos este mes.<br/>Registra el primero arriba.</div>
                    : entries.map(e=><EntryRow key={e.id} e={e} onDel={handleDelete} deleting={deletingId===e.id}/>)
                }
              </div>
            </div>

            {/* RIGHT PANEL */}
            <div style={{padding:22}}>
              <div style={{display:"flex",gap:3,marginBottom:18,background:S.surface,borderRadius:9,padding:3,border:`1px solid ${S.border}`,width:"fit-content"}}>
                {TABS.map(t=><TabBtn key={t.id} active={tab===t.id} onClick={()=>setTab(t.id)}>{t.l}</TabBtn>)}
              </div>
              <div style={{background:S.surface,border:`1px solid ${S.border}`,borderRadius:12,padding:22}}>
                <div style={{marginBottom:16}}>
                  <div style={{fontWeight:700,fontSize:15}}>{TABS.find(t=>t.id===tab)?.l}</div>
                  <div style={{color:S.tx3,fontSize:12,marginTop:2}}>{MONTHS[month]} {year} · Local CSV · <span style={{color:providerColor}}>{providerLabel}</span></div>
                </div>
                {tab==="resumen"    && <Resumen    entries={entries} month={month} year={year}/>}
                {tab==="resultados" && <Resultados entries={entries}/>}
                {tab==="flujo"      && <Flujo      entries={entries}/>}
                {tab==="balance"    && <Balance    entries={entries}/>}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── ROOT ─────────────────────────────────────────────────────────────────
    function App() {
      const [ready, setReady] = useState(!!(getApiKey() && getProvider()));
      if (!ready) return <ApiKeySetup onSave={()=>setReady(true)}/>;
      return <MainApp/>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
